name: flutter_download_manager
description: "多平台媒体下载器 - Flutter 纯 Dart 版本"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  gal: ^2.3.0
  path_provider: ^2.1.0
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
