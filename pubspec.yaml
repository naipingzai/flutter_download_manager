name: flutter_download_manager
description: "多平台媒体下载器 - Flutter + C++ 版本"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqlite3: ^2.5.0
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  ffi: ^2.1.3
  url_launcher: ^6.3.0
  desktop_window: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
